# Load local secrets from a non-tracked env file when running from either the
# repo root or the backend module directory.
spring.config.import=optional:file:./.env[.properties],optional:file:./worksphere/.env[.properties]

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true
spring.profiles.active=dev
server.error.include-message=always
spring.web.resources.static-locations=classpath:/static/,file:uploads/

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.transport.protocol=smtp
